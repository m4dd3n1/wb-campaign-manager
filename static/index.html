<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wildberries Campaign Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .results {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 2px solid #e0e0e0;
        }
        
        .result-item {
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .result-item.deleted {
            border-left-color: #ff6b6b;
        }
        
        .status {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .hidden {
            display: none;
        }
        
        .info {
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Wildberries Campaign Manager</h1>
        
        <div class="info">
            ℹ️ Приложение анализирует рекламные кампании на Wildberries и автоматически удаляет кластеры с высоким CPO
        </div>
        
        <form id="analysisForm">
            <div class="form-group">
                <label for="apiKey">API Ключ Wildberries *</label>
                <input type="password" id="apiKey" name="apiKey" required placeholder="Введите ваш API ключ">
            </div>
            
            <div class="form-group">
                <label for="campaignIds">ID Кампаний (через запятую) *</label>
                <textarea id="campaignIds" name="campaignIds" required placeholder="Пример: 123456, 789012, 345678"></textarea>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label for="cpoThreshold">Порог CPO (%) *</label>
                    <input type="number" id="cpoThreshold" name="cpoThreshold" value="10" min="0" max="100" step="0.1" required>
                </div>
            </div>
            
            <button type="submit" id="analyzeBtn">Запустить анализ</button>
        </form>
        
        <div id="statusContainer" class="hidden">
            <div id="statusMessage" class="status"></div>
        </div>
        
        <div id="resultsContainer" class="results hidden">
            <h2>📊 Результаты анализа</h2>
            <div id="resultsList"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('analysisForm');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const statusContainer = document.getElementById('statusContainer');
        const statusMessage = document.getElementById('statusMessage');
        const resultsContainer = document.getElementById('resultsContainer');
        const resultsList = document.getElementById('resultsList');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const apiKey = document.getElementById('apiKey').value;
            const campaignIds = document.getElementById('campaignIds').value
                .split(',')
                .map(id => id.trim())
                .filter(id => id);
            const cpoThreshold = parseFloat(document.getElementById('cpoThreshold').value);
            
            if (!apiKey || campaignIds.length === 0) {
                showStatus('Заполните все обязательные поля!', 'error');
                return;
            }
            
            analyzeBtn.disabled = true;
            showStatus('⏳ Анализ в процессе...', 'loading');
            resultsContainer.classList.add('hidden');
            
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        api_key: apiKey,
                        campaign_ids: campaignIds,
                        cpo_threshold: cpoThreshold
                    })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || 'Ошибка при анализе');
                }
                
                showStatus(`✅ ${data.message}`, 'success');
                displayResults(data.deleted_clusters, cpoThreshold);
                
            } catch (error) {
                showStatus(`❌ Ошибка: ${error.message}`, 'error');
            } finally {
                analyzeBtn.disabled = false;
            }
        });
        
        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = `status ${type}`;
            statusContainer.classList.remove('hidden');
        }
        
        function displayResults(clusters, threshold) {
            if (clusters.length === 0) {
                resultsList.innerHTML = '<p>Нет кластеров для удаления.</p>';
            } else {
                resultsList.innerHTML = clusters.map(cluster => `
                    <div class="result-item deleted">
                        <strong>Кластер ID:</strong> ${cluster.cluster_id}<br>
                        <strong>CPO:</strong> ${cluster.cpo.toFixed(2)}% (порог: ${threshold}%)<br>
                        <strong>Цена товара:</strong> ₽${cluster.product_price}<br>
                        <strong>Статус:</strong> ✓ Удален<br>
                        <strong>Причина:</strong> ${cluster.reason}
                    </div>
                `).join('');
            }
            resultsContainer.classList.remove('hidden');
        }
    </script>
</body>
</html>
